<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Recept</title>

    <!-- propojení CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Google font -->
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans&display=swap" rel="stylesheet">
</head>

<body>

<header>
    <h1>Domácí palačinky</h1>
</header>

<main>

<section class="recipe-image">
    <img src="images/palacinky.jpg" alt="Palačinky">
</section>

<section class="ingredients">
    <h2>Ingredience</h2>
    <ul>
        <li>2 vejce</li>
        <li>200 g mouky</li>
        <li>300 ml mléka</li>
        <li>špetka soli</li>
    </ul>
</section>

<section class="instructions">
    <h2>Postup</h2>
    <ol>
        <li>Smíchejte mouku, vejce a mléko.</li>
        <li>Přidejte špetku soli.</li>
        <li>Rozpalte pánev a nalijte těsto.</li>
        <li>Opékejte z obou stran.</li>
    </ol>
</section>

</main>

</body>
</html>
